name: CI/CD

on:
  push:
    branches: [main, harden]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build + Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ['18', '20', '22']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Verify dist output
        run: |
          TOOLS=$(node -e "const { getAllTools } = require('./dist/tools/index.js'); console.log(getAllTools().length);")
          echo "Tools in dist: $TOOLS"
          if [ "$TOOLS" -lt 20 ]; then echo "ERROR: Expected at least 20 tools, got $TOOLS"; exit 1; fi

      - name: Check for vulnerabilities
        run: npm audit --audit-level=high

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: OSV Scanner
        uses: google/osv-scanner-action@v2
        with:
          scan-args: --recursive .

      - name: Check for secrets in source
        run: |
          if grep -r "apiKey\|apiSecret\|API_KEY\|API_SECRET\|secret\|token" src/ --include="*.ts" | grep -v "process.env"; then
            echo "WARNING: Potential hardcoded secret found in source"
          else
            echo "No secrets found in source"
          fi

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: [build-and-test, audit]
    if: github.event_name == 'release' && github.event.action == 'published'
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}